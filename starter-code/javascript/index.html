<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        .coming-soon {
            text-align: center;
            color: #666;
            padding: 40px;
        }
        
        /* TODO: Add more styles as you build the app */
        
        .todo-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .todo-input input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        
        .todo-input button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .todo-input button:hover {
            background: #5a6fd6;
        }
        
        .todo-list {
            list-style: none;
        }
        
        .todo-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        
        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }
        
        .todo-checkbox {
            margin-right: 12px;
            width: 20px;
            height: 20px;
        }
        
        .todo-text {
            flex: 1;
        }
        
        .todo-delete {
            background: #ff4757;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Todo App</h1>
        
        <!-- Coming Soon Message - Remove this when you start building -->
        <div class="coming-soon" id="coming-soon">
            <h2>Coming Soon!</h2>
            <p>Start the exercises to build this app with GitHub Copilot</p>
        </div>
        
        <!-- 
        TODO: Uncomment and complete these sections as you work through the exercises
        
        <div class="todo-input">
            <input type="text" id="todo-input" placeholder="What needs to be done?">
            <button id="add-btn">Add</button>
        </div>
        
        <ul class="todo-list" id="todo-list">
            <!-- Todos will be rendered here -->
        </ul>
        
        <div class="todo-filters">
            <button data-filter="all">All</button>
            <button data-filter="active">Active</button>
            <button data-filter="completed">Completed</button>
        </div>
        -->
    </div>
    
    <script type="module" src="src/app.js"></script>
</body>
</html>
